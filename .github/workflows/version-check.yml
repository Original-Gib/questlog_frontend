name: Version Check

on:
  pull_request:
    branches:
      - main

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Get PR version
        id: pr_version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Get main version
        id: main_version
        run: |
          git fetch origin main
          echo "version=$(git show origin/main:package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version")" >> $GITHUB_OUTPUT

      - name: Compare versions
        run: |
          PR="${{ steps.pr_version.outputs.version }}"
          MAIN="${{ steps.main_version.outputs.version }}"
          if [ "$(printf '%s\n' "$MAIN" "$PR" | sort -V | tail -1)" = "$MAIN" ]; then
            echo "## ❌ Version check failed" >> $GITHUB_STEP_SUMMARY
            echo "The version in \`package.json\` must be greater than the version on \`main\`." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| | Version |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| \`main\` | \`$MAIN\` |" >> $GITHUB_STEP_SUMMARY
            echo "| This PR | \`$PR\` |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Bump the version in \`package.json\` before merging." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "## ✅ Version check passed" >> $GITHUB_STEP_SUMMARY
          echo "\`$MAIN\` → \`$PR\`" >> $GITHUB_STEP_SUMMARY
